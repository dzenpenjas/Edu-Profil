<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Siswa - EduProfil</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
}

header{
    background:#1e3a8a;
    color:white;
    padding:20px;
    text-align:center;
    font-size:20px;
    font-weight:600;
}

.container{
    width:95%;
    max-width:800px;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.profile{
    text-align:center;
}

.profile img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
}

h2{
    color:#1e3a8a;
    margin-bottom:5px;
}

.section{
    margin-top:20px;
}

.section h3{
    margin-bottom:10px;
    color:#1e3a8a;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    margin-top:15px;
}

.btn-primary{ background:#1e3a8a; color:white; }
.btn-warning{ background:#f59e0b; color:white; }
.btn-back{ background:#6b7280; color:white; }

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    width:95%;
    max-width:500px;
    padding:20px;
    border-radius:12px;
    position:relative;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:20px;
    cursor:pointer;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border-radius:8px;
    border:1px solid #ddd;
}
</style>
</head>

<body>

<header>📘 DETAIL SISWA</header>

<div class="container">

<div class="card">
<div class="profile">
<img id="fotoSiswa" src="https://via.placeholder.com/150">
<h2 id="namaLengkap"></h2>
<p id="namaPanggilan"></p>
</div>

<div class="section">
<h3>Keunikan</h3>
<p id="keunikan"></p>
</div>

<div class="section">
<h3>Catatan Guru</h3>
<p id="catatan"></p>
</div>

<button class="btn-warning" onclick="bukaModal()">✏ Edit Data</button>
<button class="btn-back" onclick="kembali()">⬅ Kembali</button>

</div>

</div>

<!-- MODAL EDIT -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="tutupModal()">&times;</span>
<h3>Edit Data Siswa</h3>

<input type="text" id="editNamaLengkap">
<input type="text" id="editNamaPanggilan">
<textarea id="editKeunikan"></textarea>
<textarea id="editCatatan"></textarea>

<button class="btn-primary" onclick="simpanEdit()">Simpan Perubahan</button>
</div>
</div>

<script>

let kelas = JSON.parse(localStorage.getItem("dataKelas")) || [];
let kelasIndex = localStorage.getItem("kelasDipilih");
let siswaIndex = localStorage.getItem("siswaDipilih");

if(kelasIndex === null || siswaIndex === null){
    window.location.href="index.html";
}

let siswa = kelas[kelasIndex].siswa[siswaIndex];

document.getElementById("fotoSiswa").src = siswa.foto || "https://via.placeholder.com/150";
document.getElementById("namaLengkap").innerText = siswa.namaLengkap;
document.getElementById("namaPanggilan").innerText = siswa.namaPanggilan;
document.getElementById("keunikan").innerText = siswa.keunikan || "-";
document.getElementById("catatan").innerText = siswa.catatan || "-";

function kembali(){
    window.location.href="dafsis.html";
}

function bukaModal(){
    document.getElementById("modal").style.display="flex";

    document.getElementById("editNamaLengkap").value = siswa.namaLengkap;
    document.getElementById("editNamaPanggilan").value = siswa.namaPanggilan;
    document.getElementById("editKeunikan").value = siswa.keunikan;
    document.getElementById("editCatatan").value = siswa.catatan;
}

function tutupModal(){
    document.getElementById("modal").style.display="none";
}

function simpanEdit(){
    siswa.namaLengkap = document.getElementById("editNamaLengkap").value.trim();
    siswa.namaPanggilan = document.getElementById("editNamaPanggilan").value.trim();
    siswa.keunikan = document.getElementById("editKeunikan").value.trim();
    siswa.catatan = document.getElementById("editCatatan").value.trim();

    kelas[kelasIndex].siswa[siswaIndex] = siswa;

    localStorage.setItem("dataKelas", JSON.stringify(kelas));

    location.reload();
}

</script>

</body>
</html>
