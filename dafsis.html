<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Siswa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
}

header{
    background:#1e3a8a;
    color:white;
    padding:20px;
    text-align:center;
    font-size:20px;
    font-weight:600;
}

.container{
    width:95%;
    max-width:1100px;
    margin:30px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.btn-primary{ background:#1e3a8a; color:white; }
.btn-danger{ background:#dc2626; color:white; }
.btn-success{ background:#16a34a; color:white; }
.btn-back{ background:#6b7280; color:white; }

.student-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.student-card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    position:relative;
}

.student-card:hover{
    transform:translateY(-5px);
}

.student-card img{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
}

.delete-btn{
    position:absolute;
    top:8px;
    right:8px;
    background:#dc2626;
    color:white;
    border:none;
    border-radius:6px;
    padding:3px 6px;
    font-size:12px;
    cursor:pointer;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    width:95%;
    max-width:500px;
    padding:20px;
    border-radius:12px;
    position:relative;
    animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
    from{transform:scale(0.9); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:20px;
    cursor:pointer;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border-radius:8px;
    border:1px solid #ddd;
}

video{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.preview{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    margin-top:10px;
}
</style>
</head>

<body>

<header>📘 DAFTAR SISWA</header>

<div class="container">

<div class="card">
<button class="btn-back" onclick="kembali()">⬅ Kembali</button>
<h2 id="namaKelas"></h2>
<br>
<button class="btn-primary" onclick="bukaModal()">➕ Tambah Siswa</button>
</div>

<div class="card">
<div id="daftarSiswa" class="student-grid"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="tutupModal()">&times;</span>
<h3>Tambah Siswa</h3>

<button class="btn-success" onclick="bukaKamera()">📷 Buka Kamera</button>
<video id="video" autoplay style="display:none;"></video>
<button class="btn-primary" onclick="ambilFoto()" id="btnAmbil" style="display:none;">📸 Ambil Foto</button>

<img id="previewFoto" class="preview">

<input type="text" id="namaLengkap" placeholder="Nama Lengkap">
<input type="text" id="namaPanggilan" placeholder="Nama Panggilan">
<textarea id="keunikan" placeholder="Keunikan siswa"></textarea>
<textarea id="catatan" placeholder="Catatan guru"></textarea>

<button class="btn-primary" onclick="tambahSiswa()">Simpan</button>

</div>
</div>

<script>

let kelas = JSON.parse(localStorage.getItem("dataKelas")) || [];
let kelasIndex = localStorage.getItem("kelasDipilih");
let stream;
let fotoBase64 = "";

if(kelasIndex === null){
    window.location.href="index.html";
}

document.getElementById("namaKelas").innerText = kelas[kelasIndex].nama;

function simpanData(){
    localStorage.setItem("dataKelas", JSON.stringify(kelas));
}

function kembali(){
    window.location.href="index.html";
}

function bukaModal(){
    document.getElementById("modal").style.display="flex";
}

function tutupModal(){
    document.getElementById("modal").style.display="none";
}

function bukaKamera(){
    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
        }
    })
    .then(function(s){
        stream=s;
        document.getElementById("video").srcObject=stream;
    })
    .catch(function(err){
        console.log("Gagal:", err);
    });
}

function ambilFoto(){
    let video=document.getElementById("video");
    let canvas=document.createElement("canvas");
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);

    fotoBase64=canvas.toDataURL("image/png");
    document.getElementById("previewFoto").src=fotoBase64;

    stream.getTracks().forEach(track=>track.stop());
    video.style.display="none";
    document.getElementById("btnAmbil").style.display="none";
}

function tambahSiswa(){
    let namaLengkap=document.getElementById("namaLengkap").value.trim();
    let namaPanggilan=document.getElementById("namaPanggilan").value.trim();
    let keunikan=document.getElementById("keunikan").value.trim();
    let catatan=document.getElementById("catatan").value.trim();

    if(namaLengkap===""){
        alert("Nama lengkap wajib diisi!");
        return;
    }

    kelas[kelasIndex].siswa.push({
        foto:fotoBase64,
        namaLengkap,
        namaPanggilan,
        keunikan,
        catatan
    });

    simpanData();
    tampilkanSiswa();
    tutupModal();
    resetForm();
}

function resetForm(){
    fotoBase64="";
    document.getElementById("previewFoto").src="";
    document.getElementById("namaLengkap").value="";
    document.getElementById("namaPanggilan").value="";
    document.getElementById("keunikan").value="";
    document.getElementById("catatan").value="";
}

function tampilkanSiswa(){
    let container=document.getElementById("daftarSiswa");
    container.innerHTML="";

    kelas[kelasIndex].siswa.forEach((data,index)=>{
        let card=document.createElement("div");
        card.className="student-card";

        card.innerHTML=`
            <button class="delete-btn" onclick="hapusSiswa(${index});event.stopPropagation()">x</button>
            <img src="${data.foto || 'https://via.placeholder.com/80'}">
            <strong>${data.namaLengkap}</strong><br>
            <small>${data.namaPanggilan}</small>
        `;

        card.onclick=function(){
            localStorage.setItem("siswaDipilih",index);
            window.location.href="idensis.html";
        };

        container.appendChild(card);
    });
}

function hapusSiswa(index){
    if(confirm("Yakin hapus siswa?")){
        kelas[kelasIndex].siswa.splice(index,1);
        simpanData();
        tampilkanSiswa();
    }
}

tampilkanSiswa();

</script>

</body>
</html>
